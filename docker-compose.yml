services:

  # =============================================
  # Database
  # =============================================
  db:
    image: mysql:8.0
    container_name: posai_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-posai_password}
      MYSQL_DATABASE: ${DB_NAME:-posai}
      MYSQL_USER: ${DB_USER:-posai_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-posai_password}
    volumes:
      - posai_mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-posai_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - posai_net

  # =============================================
  # Backend (FastAPI)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: posai_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-posai_user}:${DB_PASSWORD:-posai_password}@db:3306/${DB_NAME:-posai}
      DB_HOST: db
      DB_USER: ${DB_USER:-posai_user}
      DB_PASSWORD: ${DB_PASSWORD:-posai_password}
      DB_NAME: ${DB_NAME:-posai}
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-random-secret-key-minimum-32-chars}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin123}
      DEBUG: ${DEBUG:-false}
    volumes:
      - posai_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - posai_net

  # =============================================
  # Frontend (Vue 3 + Nginx)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: posai_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - posai_net

# =============================================
# Networks & Volumes
# =============================================
networks:
  posai_net:
    driver: bridge

volumes:
  posai_mysql_data:
  posai_uploads:
